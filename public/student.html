<!DOCTYPE html>
<html lang="en">
<head>
    <title>Helpdesk</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        /* 🌊 SLATE LIQUID BACKGROUND */
        body { 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; padding: 20px; color: #e2e8f0; 
            background: linear-gradient(-45deg, #16222A, #1C2A33, #243441, #1A252E);
            background-size: 400% 400%;
            animation: liquidBg 15s ease infinite;
            min-height: 100vh;
        }
        @keyframes liquidBg {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .container { max-width: 1100px; margin: 0 auto; display: grid; grid-template-columns: 1.4fr 1fr; gap: 25px; position: relative; z-index: 2; }
        .card { 
            background: rgba(38, 53, 61, 0.6); 
            backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
            padding: 25px; border-radius: 12px; 
            border: 1px solid rgba(255, 255, 255, 0.05); 
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.2);
            margin-bottom: 20px; 
        }
        h2 { margin-top: 0; color: #e2e8f0; font-size: 1.3rem; font-weight: 600; display: flex; align-items: center; gap: 8px; }
        .input-group { margin-bottom: 15px; }
        label { font-weight: 600; display: block; margin-bottom: 6px; font-size: 0.8rem; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.5px; }
        input[type="text"], input[type="email"], select, textarea { 
            width: 100%; padding: 12px; background: rgba(22, 34, 42, 0.8); 
            border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 8px; 
            box-sizing: border-box; font-family: inherit; color: white; transition: 0.3s;
        }
        select option { background: #1C2A33; color: white; }
        input:focus, select:focus, textarea:focus { outline: none; border-color: #38bdf8; background: rgba(22, 34, 42, 1); box-shadow: 0 0 10px rgba(56, 189, 248, 0.1); }
        #map { height: 250px; border-radius: 8px; border: 1px solid rgba(255, 255, 255, 0.1); margin-bottom: 5px; cursor: crosshair; }
        .map-hint { font-size: 0.8rem; color: #94a3b8; display: block; margin-bottom: 10px; }
        .google-maps-link { font-size: 0.85rem; color: #38bdf8; text-decoration: none; font-weight: bold; display: inline-block; margin-top: 5px; }
        .btn-submit { 
            background: #2C7A7B; color: #ffffff; border: none; padding: 12px; width: 100%; 
            border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s; 
            box-shadow: 0 4px 15px rgba(44, 122, 123, 0.2);
        }
        .btn-submit:hover { background: #319795; transform: translateY(-2px); }
        .track-card { border-top: 2px solid #2C7A7B; }
        .trending-board { border-top: 2px solid #fbbf24; }
        #trackResult { margin-top: 15px; padding: 12px; border-radius: 8px; background: rgba(22, 34, 42, 0.8); border: 1px solid rgba(255,255,255,0.05); }
        .issue-card { 
            background: rgba(22, 34, 42, 0.5); padding: 15px; border-radius: 8px; 
            margin-bottom: 12px; border: 1px solid rgba(255,255,255,0.05); 
            display: flex; justify-content: space-between; align-items: center; 
        }
        .btn-upvote { 
            background: rgba(255, 255, 255, 0.05); color: #cbd5e1; 
            border: 1px solid rgba(255,255,255,0.08); padding: 6px 12px; 
            border-radius: 20px; font-weight: bold; cursor: pointer; 
        }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <h2>📝 Report Campus Issue</h2>
        <form id="complaintForm" onsubmit="submitForm(event)">
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                <div class="input-group"><label>Name</label><input type="text" id="sName" required></div>
                <div class="input-group"><label>Reg No</label><input type="text" id="sReg" required></div>
            </div>
            <div class="input-group"><label>Email</label><input type="email" id="sEmail" required></div>
            <div class="input-group">
                <label>Category</label>
                <select id="sCat" required>
                    <option value="">Select Category...</option>
                    <option value="Plumbing">💧 Plumbing</option>
                    <option value="Electrical">⚡ Electrical</option>
                    <option value="Furniture">🪑 Furniture</option>
                    <option value="Network">🌐 Wi-Fi</option>
                    <option value="Cleaning">🧹 Cleaning & Trash</option>
                    <option value="Canteen">🍔 Canteen</option>
                </select>
            </div>
            <div class="input-group">
                <label>Tap Location on Campus</label>
                <div id="map"></div>
                <div id="dynamicMapLink"></div> 
                <span class="map-hint">📍 Move the map to find your exact building</span>
                <input type="hidden" id="lat"><input type="hidden" id="lng">
            </div>
            <div class="input-group">
                <label>Evidence (Up to 10 images)</label>
                <input type="file" id="sPhotos" multiple accept="image/*">
            </div>
            <div class="input-group"><label>Description</label><textarea id="sDesc" rows="3" required></textarea></div>
            <button type="submit" class="btn-submit" id="submitBtn">Submit Report</button>
        </form>
    </div>

    <div class="side-panel">
        <div class="card track-card">
            <h2>🔍 Track My Ticket</h2>
            <div class="input-group">
                <input type="text" id="trackIdInput" placeholder="Enter Tracking ID (SRM-XXXXXX)">
            </div>
            <button class="btn-submit" style="background: rgba(255,255,255,0.08); color: #e2e8f0;" onclick="trackTicket()">Check Status</button>
            <div id="trackResult" style="display: none;"></div>

            <div id="feedbackSection" style="display: none; margin-top: 20px; padding-top: 20px; border-top: 1px solid rgba(255,255,255,0.1);">
                <label style="color: #38bdf8;">Rate the Resolution</label>
                <select id="feedbackRating" style="margin-bottom: 10px;">
                    <option value="5">⭐⭐⭐⭐⭐ - Excellent</option>
                    <option value="4">⭐⭐⭐⭐ - Good</option>
                    <option value="3">⭐⭐⭐ - Average</option>
                    <option value="2">⭐⭐ - Poor</option>
                    <option value="1">⭐ - Terrible</option>
                </select>
                <textarea id="feedbackComment" rows="2" placeholder="Leave a comment..."></textarea>
                <button class="btn-submit" style="background: #4ade80; color: #1C2A33; margin-top: 10px;" onclick="submitFeedback()">Submit Feedback</button>
            </div>
        </div>

        <div class="card trending-board">
            <h2 style="color: #fbbf24;">🔥 Trending Near You</h2>
            <div id="trendingContainer"><p>Loading issues...</p></div>
        </div>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    // 1. Map Setup
    var ramapuramCenter = [13.0324, 80.1785];
    var campusBounds = L.latLngBounds([13.0280, 80.1730], [13.0370, 80.1850]);
    var map = L.map('map', { center: ramapuramCenter, zoom: 17, minZoom: 16, maxBounds: campusBounds, maxBoundsViscosity: 1.0 });
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    var marker;
    map.on('click', function(e) {
        if(marker) map.removeLayer(marker);
        marker = L.marker(e.latlng).addTo(map);
        document.getElementById('lat').value = e.latlng.lat;
        document.getElementById('lng').value = e.latlng.lng;
        document.getElementById('dynamicMapLink').innerHTML = `<a href="https://www.google.com/maps?q=${e.latlng.lat},${e.latlng.lng}" target="_blank" class="google-maps-link">📍 Open in Google Maps</a>`;
    });

    // 2. Submit Form
    async function submitForm(e) {
        e.preventDefault();
        if(!document.getElementById('lat').value) return alert("Please pin the location on the map!");
        
        const btn = document.getElementById('submitBtn');
        btn.innerText = "Processing..."; btn.disabled = true;

        const formData = new FormData();
        formData.append('studentName', document.getElementById('sName').value);
        formData.append('regNumber', document.getElementById('sReg').value);
        formData.append('studentEmail', document.getElementById('sEmail').value);
        formData.append('category', document.getElementById('sCat').value);
        formData.append('description', document.getElementById('sDesc').value);
        formData.append('lat', document.getElementById('lat').value);
        formData.append('lng', document.getElementById('lng').value);

        const files = document.getElementById('sPhotos').files;
        for (let i = 0; i < files.length; i++) formData.append('photos', files[i]);

        const res = await fetch('/api/submit', { method: 'POST', body: formData });
        const data = await res.json();
        if(res.ok) { alert(`Reported! ID: ${data.trackingId}`); location.reload(); }
        else { alert("Error sending report."); btn.innerText = "Submit Report"; btn.disabled = false; }
    }

    // 3. Tracking & Feedback
    async function trackTicket() {
        const id = document.getElementById('trackIdInput').value.trim();
        const resultDiv = document.getElementById('trackResult');
        const feedbackDiv = document.getElementById('feedbackSection');
        if (!id) return alert("Enter ID first");

        resultDiv.style.display = "block";
        resultDiv.innerHTML = "Searching...";
        
        const res = await fetch(`/api/track/${id}`);
        if (res.ok) {
            const data = await res.json();
            let color = data.status === "Pending" ? "#f87171" : data.status === "In Progress" ? "#fbbf24" : "#4ade80";
            resultDiv.innerHTML = `Category: ${data.category}<br>Status: <span style="color:${color}; font-weight: bold;">${data.status}</span>`;
            if (data.status === "Resolved") { feedbackDiv.style.display = "block"; feedbackDiv.dataset.ticketId = id; }
        } else { resultDiv.innerHTML = "<span style='color:#f87171;'>Ticket not found!</span>"; }
    }

  async function submitFeedback() {
        const id = document.getElementById('feedbackSection').dataset.ticketId;
        const rating = document.getElementById('feedbackRating').value;
        const comment = document.getElementById('feedbackComment').value;
        
        console.log("Sending feedback for:", id); // Diagnostic log

        const res = await fetch('/api/feedback', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ trackingId: id, rating: parseInt(rating), comment: comment })
        });
        
        if (res.ok) {
            alert("✅ Feedback successfully logged in database!");
            document.getElementById('feedbackSection').style.display = "none";
        } else {
            const errorText = await res.text();
            alert("❌ Server Error: " + errorText);
        }
    }

    // 4. Trending
    async function loadTrending() {
        const res = await fetch('/api/active-issues');
        const issues = await res.json();
        const container = document.getElementById('trendingContainer');
        if(issues.length === 0) { container.innerHTML = "No issues reported yet."; return; }
        container.innerHTML = '';
        issues.forEach(issue => {
            const div = document.createElement('div');
            div.className = 'issue-card';
            div.innerHTML = `<div><strong>${issue.category}</strong><br><small>${issue.status}</small></div><button class="btn-upvote" onclick="upvote(${issue.id})">👍 ${issue.upvotes}</button>`;
            container.appendChild(div);
        });
    }

    async function upvote(id) { await fetch(`/api/upvote/${id}`, { method: 'POST' }); loadTrending(); }
    loadTrending();
</script>
</body>
</html>
