<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Worker Portal</title>
    <link rel="icon" href="data:;base64,iVBORw0KGgo=">
    <style>
        /* 🌊 LIQUID BACKGROUND */
        body { 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; 
            padding: 15px; 
            color: white;
            background: linear-gradient(-45deg, #16222A, #1C2A33, #243441, #1A252E);
            background-size: 400% 400%;
            animation: liquidBg 15s ease infinite;
            min-height: 100vh;
        }

        @keyframes liquidBg {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        
        /* 🧊 GLASSMORPHISM LOGIN */
        #login-container { 
            max-width: 400px; margin: 100px auto; 
            background: rgba(38, 53, 61, 0.6); 
            backdrop-filter: blur(16px); 
            -webkit-backdrop-filter: blur(16px);
            padding: 30px; border-radius: 12px; 
            border: 1px solid rgba(255,255,255,0.05); 
            text-align: center; 
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.2);
        }
        
        input { width: 100%; padding: 12px; margin-bottom: 15px; background: rgba(22, 34, 42, 0.8); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; color: white; box-sizing: border-box; }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .btn-login { background: #2C7A7B; color: white; }

        /* 🧊 GLASSMORPHISM TASK CARDS */
        #dashboard-container { display: none; max-width: 800px; margin: 0 auto; }
        .task-card { 
            background: rgba(38, 53, 61, 0.6); 
            backdrop-filter: blur(16px); 
            -webkit-backdrop-filter: blur(16px);
            border-radius: 12px; padding: 20px; margin-bottom: 20px; 
            border-left: 5px solid #fbbf24; 
            border: 1px solid rgba(255,255,255,0.05); 
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.2);
        }
        .category { font-weight: bold; color: #38bdf8; font-size: 1.1rem; margin-bottom: 5px; }
        .desc { margin: 10px 0; font-size: 0.95rem; color: #e2e8f0; }
        
        .btn-map { 
            display: block; background: rgba(6, 182, 212, 0.1); color: #38bdf8; 
            text-align: center; padding: 12px; border-radius: 8px; 
            text-decoration: none; font-weight: bold; margin: 15px 0; 
            border: 1px solid rgba(6, 182, 212, 0.3); transition: 0.2s;
        }
        .btn-map:hover { background: #0ea5e9; color: #1C2A33; }
        .note-box { width: 100%; padding: 12px; background: rgba(22, 34, 42, 0.8); border: 1px solid rgba(255,255,255,0.1); color: white; border-radius: 8px; margin-bottom: 15px; box-sizing: border-box; font-family: inherit; resize: vertical; }
        .action-buttons { display: flex; gap: 10px; }
        .btn-progress { background: #fbbf24; color: #1C2A33; flex: 1; }
        .btn-resolved { background: #4ade80; color: #1C2A33; flex: 1; }

        /* 🌟 CLICK ANIMATIONS */
        button { transition: transform 0.1s ease, box-shadow 0.2s ease; }
        button:active { transform: scale(0.92) !important; }
    </style>
</head>
<body>

<!-- LOGIN AREA -->
<div id="login-container">
    <h2 style="color: #cbd5e1; margin-top: 0;">🛠️ Tech Portal</h2>
    <p style="font-size: 0.8rem; color: #94a3b8; margin-bottom: 20px;">Worker Access Only</p>
    
    <!-- FIX: Wrapped in a form to stop the Chrome warning -->
    <form onsubmit="event.preventDefault(); login();">
        <input type="text" id="username" placeholder="Username" required>
        <div style="position: relative; display: flex; align-items: center; width: 100%; margin-bottom: 15px;">
    <input type="password" id="password" placeholder="Password" required style="margin-bottom: 0; padding-right: 40px;">
    <span onclick="togglePasswordVisibility('password', this)" style="position: absolute; right: 15px; cursor: pointer; color: #94a3b8; font-size: 1.1rem; user-select: none;">👁</span>
</div>
        <button type="submit" class="btn btn-login">Enter Dashboard</button>
    </form>
</div>
<!-- DASHBOARD AREA -->
<div id="dashboard-container">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; padding: 10px 0;">
        <h3 id="welcome" style="margin: 0; color: #e2e8f0;">Active Jobs</h3>
        <div style="display: flex; gap: 10px;">
            <button onclick="editProfile()" style="background: rgba(56, 189, 248, 0.2); color: #38bdf8; border: 1px solid #38bdf8; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 0.8rem;">⚙️ Profile</button>
            <button onclick="location.reload()" style="background: rgba(248, 113, 113, 0.2); color: #f87171; border: 1px solid #f87171; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 0.8rem;">Logout</button>
        </div>
    </div>
    <div id="task-list"></div>
</div>

<script>
    let currentWorkerName = "";
    let currentWorkerProfile = null; // Stores ID, Username, Password

    async function login() {
        const user = document.getElementById('username').value;
        const pass = document.getElementById('password').value;

        try {
            const res = await fetch('/api/worker-login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username: user, password: pass })
            });

            const data = await res.json();
            
            if (data.success) {
                currentWorkerName = data.workerName;
                currentWorkerProfile = data.workerProfile; // Save profile for editing
                
                document.getElementById('login-container').style.display = 'none';
                document.getElementById('dashboard-container').style.display = 'block';
                document.getElementById('welcome').innerText = `Tasks for ${currentWorkerName}`;
                
                fetchTasks();
            } else {
                alert("Invalid credentials. Please check your username and password.");
            }
        } catch (err) {
            console.error("Login failed:", err);
            alert("Connection error. Is your server running?");
        }
    }

    // ⚙️ NEW: EDIT PROFILE FUNCTION
   async function editProfile() {
        if (!currentWorkerProfile) {
            alert("⚠️ Profile data is missing! Please log out and log back in to refresh your connection.");
            return;
        }

        const newName = prompt("Update your Name:", currentWorkerProfile.name);
        if (!newName) return; 
        const newUsername = prompt("Update your Username:", currentWorkerProfile.username);
        if (!newUsername) return; 
        const newPassword = prompt("Update your Password:", currentWorkerProfile.password);
        if (!newPassword) return; 

        // NEW: Security Check for Special Characters
        if (!/[!@#$%^&*(),.?":{}|<>]/.test(newPassword)) {
            return alert("⚠️ Security Alert: Your new password must contain at least one special character (e.g., @, #, $, !). Profile update cancelled.");
        }

        try {
            const res = await fetch('/api/update-technician', { 
                method: 'POST', 
                headers: {'Content-Type': 'application/json'}, 
                body: JSON.stringify({ 
                    id: currentWorkerProfile.id, 
                    name: newName, 
                    username: newUsername, 
                    password: newPassword 
                }) 
            });

            if (res.ok) {
                alert("✅ Profile Updated Successfully! Please log in again with your new credentials.");
                location.reload(); 
            } else {
                alert("Update failed. That username might already be taken by someone else.");
            }
        } catch (err) {
            alert("Network error. Is the server running?");
        }
    }
    async function fetchTasks() {
        try {
            const response = await fetch('/api/worker-tasks', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ workerName: currentWorkerName })
            });

            const tasks = await response.json();
            const container = document.getElementById('task-list');
            container.innerHTML = '';

            if (tasks.length === 0) {
                container.innerHTML = '<p style="color:#94a3b8; text-align:center; margin-top: 50px;">No tasks assigned to you yet!</p>';
                return;
            }

            tasks.forEach(task => {
                const card = document.createElement('div');
                card.className = 'task-card';
                if (task.status === 'In Progress') card.style.borderLeftColor = '#fbbf24';
                if (task.status === 'Resolved') card.style.borderLeftColor = '#4ade80';

                const mapBtn = (task.latitude && task.longitude)
                    ? `<a href="https://www.google.com/maps?q=${task.latitude},${task.longitude}" target="_blank" class="btn-map">📍 View Location in Maps</a>`
                    : `<div style="text-align:center; padding:12px; color:#64748b; background: rgba(0,0,0,0.2); border-radius: 8px; margin: 15px 0; font-size: 0.85rem;">No GPS provided by student</div>`;

                card.innerHTML = `
                    <div style="display: flex; justify-content: space-between; align-items: start;">
                        <div>
                            <div class="category">${task.category}</div>
                            <div style="font-size: 0.8rem; color: #94a3b8;">ID: ${task.trackingId}</div>
                        </div>
                        <span style="font-size: 0.75rem; padding: 4px 8px; border-radius: 4px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.1);">${task.status}</span>
                    </div>
                    <div class="desc">${task.description}</div>
                    ${mapBtn}
                    <textarea id="note-${task.id}" class="note-box" placeholder="Write updates/notes here for the Admin...">${task.workerRemarks || ''}</textarea>
                    <div class="action-buttons">
                        <button class="btn btn-progress" onclick="updateStatus(${task.id}, 'In Progress')">Mark In Progress</button>
                        <button class="btn btn-resolved" onclick="updateStatus(${task.id}, 'Resolved')">Mark Resolved</button>
                    </div>
                `;
                container.appendChild(card);
            });
        } catch (err) {
            console.error("Error fetching tasks:", err);
        }
    }

    async function updateStatus(id, newStatus) {
        const remarks = document.getElementById(`note-${id}`).value;
        try {
            const res = await fetch('/api/update-status', { 
                method: 'POST', 
                headers: {'Content-Type': 'application/json'}, 
                body: JSON.stringify({ id, status: newStatus, remarks: remarks }) 
            });

            if (res.ok) {
                alert(`Success: Status updated to ${newStatus}`);
                fetchTasks(); 
            }
        } catch (err) {
            alert("Update failed. Check your connection.");
        }
    }
    function togglePasswordVisibility(fieldId, icon) {
    const field = document.getElementById(fieldId);
    if (field.type === "password") {
        field.type = "text";
        icon.innerText = "👁️‍🗨️"; 
    } else {
        field.type = "password";
        icon.innerText = "👁";
    }
    loadData();
    setInterval(loadData, 10000);
}
</script>
</body>
</html>
